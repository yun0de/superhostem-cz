name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Build static site
        shell: bash
        run: |
          rm -rf _site
          mkdir -p _site/knowledge-base/html
          mkdir -p _site/knowledge-base/articles

          cp "knowledge base/knowledge-base-site.html" _site/knowledge-base/knowledge-base-site.html
          cp "knowledge base/html/"*.html _site/knowledge-base/html/
          cp "knowledge base/articles/knowledge-base-library.html" _site/knowledge-base/articles/
          cp -R "knowledge base/assets" _site/knowledge-base/

          cat > _site/index.html <<'EOF'
          <!DOCTYPE html>
          <html lang="cs">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Superhostem.cz | GitHub Pages</title>
            <meta http-equiv="refresh" content="0; url=./knowledge-base/html/index.html">
            <style>
              body {
                margin: 0;
                min-height: 100vh;
                display: grid;
                place-items: center;
                padding: 24px;
                font-family: "Avenir Next", "Segoe UI", "Helvetica Neue", Arial, sans-serif;
                color: #1e2a25;
                background:
                  radial-gradient(circle at top left, rgba(15, 118, 110, 0.08), transparent 24%),
                  radial-gradient(circle at 85% 10%, rgba(185, 107, 54, 0.08), transparent 20%),
                  linear-gradient(180deg, #ffffff 0%, #f7f7f7 100%);
              }
              .card {
                width: min(100%, 760px);
                padding: 32px;
                border-radius: 28px;
                background: rgba(255, 255, 255, 0.96);
                border: 1px solid rgba(30, 42, 37, 0.1);
                box-shadow: 0 24px 60px rgba(67, 50, 28, 0.1);
              }
              h1 {
                margin: 0 0 12px;
                font-size: clamp(2rem, 5vw, 3.25rem);
                line-height: 1.05;
              }
              p {
                margin: 0;
                color: #607065;
                line-height: 1.7;
              }
              a {
                display: inline-block;
                margin-top: 18px;
                color: #0f766e;
                text-decoration: none;
                font-weight: 700;
              }
            </style>
          </head>
          <body>
            <div class="card">
              <h1>Superhostem.cz na GitHub Pages</h1>
              <p>Pokud nejste přesměrováni automaticky, otevřete centrum pomoci ručně.</p>
              <a href="./knowledge-base/html/index.html">Přejít do centra pomoci</a>
            </div>
          </body>
          </html>
          EOF

          touch _site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
